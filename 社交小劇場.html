<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">🎭 高中社交小劇場</h1>
            <p class="text-slate-500">對象 × 情境：探索你的「在意程度」</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <!-- 對象牌堆 -->
            <div class="flex flex-col items-center">
                <span class="text-sm font-bold text-indigo-600 mb-3 tracking-widest uppercase">對象</span>
                <div class="card-perspective w-64 h-80">
                    <div id="objectCard" class="card-inner">
                        <div class="card-face card-back">
                            <div class="text-5xl mb-4">👤</div>
                            <p class="font-bold tracking-widest">對象牌</p>
                        </div>
                        <div class="card-face card-front">
                            <p id="objectText" class="text-3xl font-bold text-indigo-600">對象</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 情境牌堆 -->
            <div class="flex flex-col items-center">
                <span class="text-sm font-bold text-purple-600 mb-3 tracking-widest uppercase">情境</span>
                <div class="card-perspective w-64 h-80">
                    <div id="situationCard" class="card-inner">
                        <div class="card-face card-back" style="background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);">
                            <div class="text-5xl mb-4">🃏</div>
                            <p class="font-bold tracking-widest">情境牌</p>
                        </div>
                        <div class="card-face card-front">
                            <span id="situationTag" class="category-tag">類別</span>
                            <p id="situationText" class="text-xl font-bold leading-relaxed px-2 text-slate-700">情境內容</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 評分區域 (在意程度) -->
        <div id="ratingSection" class="bg-white rounded-3xl p-6 shadow-md border border-indigo-100 mb-8">
            <h4 class="text-center font-bold text-slate-700 mb-4">這個情況發生時，你在意的程度是？</h4>
            <div class="flex justify-between items-center max-w-md mx-auto mb-4">
                <span class="text-xs text-slate-400">完全不在意</span>
                <span class="text-xs text-slate-400">非常在意</span>
            </div>
            <div class="flex justify-center gap-3 md:gap-6">
                <button class="rating-btn w-12 h-12 rounded-full bg-slate-100 font-bold text-slate-600" onclick="selectRating(1)">1</button>
                <button class="rating-btn w-12 h-12 rounded-full bg-slate-100 font-bold text-slate-600" onclick="selectRating(2)">2</button>
                <button class="rating-btn w-12 h-12 rounded-full bg-slate-100 font-bold text-slate-600" onclick="selectRating(3)">3</button>
                <button class="rating-btn w-12 h-12 rounded-full bg-slate-100 font-bold text-slate-600" onclick="selectRating(4)">4</button>
                <button class="rating-btn w-12 h-12 rounded-full bg-slate-100 font-bold text-slate-600" onclick="selectRating(5)">5</button>
            </div>
            <div class="text-center mt-6">
                <button id="confirmBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-full text-sm font-bold opacity-50 cursor-not-allowed" disabled="">
                    紀錄並結束此輪
                </button>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row justify-center items-center gap-4 mb-12">
            <button id="drawBtn" class="btn-draw text-white px-10 py-4 rounded-2xl font-bold text-xl shadow-lg shadow-indigo-200 w-full sm:w-auto">
                🎲 隨機抽牌
            </button>
            <button id="resetBtn" class="bg-white text-slate-500 border border-slate-200 px-10 py-4 rounded-2xl font-bold text-xl hover:bg-slate-50 w-full sm:w-auto">
                🔄 重置紀錄
            </button>
        </div>

        <!-- 歷史紀錄 -->
        <div class="bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
            <h3 class="text-lg font-bold text-slate-700 mb-6 flex items-center">
                <span class="bg-slate-100 p-2 rounded-lg mr-3">📜</span> 反思紀錄 (對象 / 情境 / 在意度)
            </h3>
            <div id="historyList" class="space-y-4">
                <p class="text-slate-400 text-center italic">尚未抽取牌組...</p>
            </div>
        </div>
    </div>

    <script>
        const objects = ["親近的人", "同學", "陌生人"];
        
        const situations = {
            negative: [
                "生日被對方忘記了",
                "分享看法時被當眾反駁",
                "想借抄作業被對方一口回絕",
                "傳了重要的訊息被已讀不回",
                "發現對方在背後討論你的缺點",
                "分組時發現大家都不想跟你一組",
                "辛苦做的報告被對方批評得一文不值",
                "不小心撞倒對方的水壺，對方臉色很難看",
                "被誤會偷拿了對方的東西",
                "努力準備的社團活動，卻被對方說很無聊",
                "在群組發問卻完全沒人回應，感覺被冷落",
                "對方把你最在意的糗事當眾講出來",
                "對方借了東西卻遲遲不還，還裝作沒這回事",
                "發現自己是全班唯一沒被邀請去聚會的人",
                "對方答應要幫忙，結果在最後一刻放你鴿子"
            ],
            positive: [
                "被稱稱讚剛剛的回答非常棒",
                "被對方主動追問近況與關心",
                "考卷發下來成績很好，對方真心為你祝賀",
                "雨天沒帶傘，對方主動邀你一起撐傘",
                "對方主動找你借筆記，表示很信任你的整理",
                "在抽屜發現對方偷偷送你的鼓勵小點心",
                "被對方邀請參加這週末的私人聚會",
                "遇到挫折時，收到對方寫滿鼓勵的小紙條",
                "對方在眾人面前維護你的名譽",
                "隨口提了一下想吃什麼，對方隔天就買來給你",
                "對方主動幫你擋下不想參加的尷尬飯局",
                "遇到不會的題目，對方很有耐心地教你到會為止",
                "對方在老師面前主動肯定你的努力與付出",
                "對方記得你隨口說過的小願望並幫你實現",
                "對方發現你情緒低落，主動留下來陪你聊天"
            ],
            joke: [
                "被吐槽今天的穿著風格很奇特",
                "講話打結時被對方大聲笑出來",
                "被取了一個聽起來有點好笑的綽號",
                "不小心在限動發了醜照被對方截圖",
                "被對方用一個無傷大雅的惡作劇嚇到",
                "被開了一個關於你暗戀對象的玩笑",
                "玩遊戲輸了，被要求去福利社大喊我是大笨蛋",
                "臉上沾到午餐奶油被對方指著笑",
                "模仿老師被對方當場撞見並一起加入",
                "對方學你說話的口頭禪，學得超級傳神",
                "對方騙你說今天不用早自習，害你差點遲到",
                "趁你不注意在你背後貼了一張「我是天才」",
                "兩個人一起挑戰最近很紅的白癡舞蹈短影音",
                "互相比賽誰可以憋笑最久，結果對方先噴笑",
                "對方故意假裝是你的神祕仰慕者傳訊息整你"
            ]
        };

        const objectCard = document.getElementById('objectCard');
        const situationCard = document.getElementById('situationCard');
        const objectText = document.getElementById('objectText');
        const situationText = document.getElementById('situationText');
        const situationTag = document.getElementById('situationTag');
        const drawBtn = document.getElementById('drawBtn');
        const resetBtn = document.getElementById('resetBtn');
        const historyList = document.getElementById('historyList');
        const ratingSection = document.getElementById('ratingSection');
        const confirmBtn = document.getElementById('confirmBtn');

        let history = [];
        let currentDraw = null;
        let selectedRating = null;

        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function selectRating(num) {
            selectedRating = num;
            document.querySelectorAll('.rating-btn').forEach((btn, index) => {
                if (index + 1 === num) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            confirmBtn.disabled = false;
            confirmBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function draw() {
            selectedRating = null;
            document.querySelectorAll('.rating-btn').forEach(btn => btn.classList.remove('active'));
            confirmBtn.disabled = true;
            confirmBtn.classList.add('opacity-50', 'cursor-not-allowed');
            ratingSection.style.display = 'none';

            objectCard.classList.remove('is-flipped');
            situationCard.classList.remove('is-flipped');

            setTimeout(() => {
                const categories = Object.keys(situations);
                const category = getRandomItem(categories);
                const obj = getRandomItem(objects);
                const sit = getRandomItem(situations[category]);

                currentDraw = { obj, sit, category };

                objectText.innerText = obj;
                situationText.innerText = sit;
                situationTag.innerText = category === 'negative' ? '負面' : category === 'positive' ? '正面' : '玩笑';
                situationTag.className = `category-tag tag-${category}`;

                objectCard.classList.add('is-flipped');
                situationCard.classList.add('is-flipped');

                setTimeout(() => {
                    ratingSection.style.display = 'block';
                }, 600);
            }, 300);
        }

        function saveRound() {
            if (!currentDraw || selectedRating === null) return;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            history.unshift({ ...currentDraw, rating: selectedRating, time });
            if (history.length > 10) history.pop();

            renderHistory();
            ratingSection.style.display = 'none';
            currentDraw = null;
        }

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<p class="text-slate-400 text-center italic">尚未抽取牌組...</p>';
                return;
            }

            historyList.innerHTML = history.map(item => `
                <div class="history-item flex flex-col sm:flex-row justify-between items-start sm:items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <div class="flex items-center flex-wrap gap-2">
                        <span class="font-bold text-indigo-600">${item.obj}</span>
                        <span class="text-slate-300">➜</span>
                        <span class="text-xs px-2 py-0.5 rounded-full font-bold tag-${item.category}">
                            ${item.category === 'negative' ? '負面' : item.category === 'positive' ? '正面' : '玩笑'}
                        </span>
                        <span class="text-slate-700 font-medium">${item.sit}</span>
                    </div>
                    <div class="flex items-center gap-3 mt-2 sm:mt-0">
                        <div class="flex items-center bg-indigo-50 px-3 py-1 rounded-full">
                            <span class="text-xs text-indigo-400 mr-1">在意度:</span>
                            <span class="font-bold text-indigo-600">${item.rating}</span>
                        </div>
                        <span class="text-xs text-slate-400">${item.time}</span>
                    </div>
                </div>
            `).join('');
        }

        function reset() {
            objectCard.classList.remove('is-flipped');
            situationCard.classList.remove('is-flipped');
            ratingSection.style.display = 'none';
            setTimeout(() => {
                history = [];
                renderHistory();
            }, 300);
        }

        drawBtn.addEventListener('click', draw);
        resetBtn.addEventListener('click', reset);
        confirmBtn.addEventListener('click', saveRound);

        [objectCard, situationCard].forEach(card => {
            card.addEventListener('click', () => {
                if (card.classList.contains('is-flipped')) {
                    card.classList.remove('is-flipped');
                } else {
                    card.classList.add('is-flipped');
                }
            });
        });
