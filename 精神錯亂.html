<body class="flex items-center justify-center min-h-screen">

    <div id="game-container" class="w-full max-w-lg p-8 bg-slate-900 rounded-3xl shadow-2xl text-center mx-4 border border-slate-700">
        <!-- 1. 開始畫面 -->
        <div id="start-screen" class="">
            <h1 class="text-5xl font-black mb-6 text-white tracking-tighter uppercase italic">精神錯亂</h1>
            <p class="text-slate-400 mb-8 leading-relaxed">
                挑戰你的視覺與大腦衝突。<br>
                <span class="text-yellow-400 font-bold">核心規則：只唸出文字的「顏色」。</span>
            </p>
            
            <div class="mb-8 p-5 bg-slate-800 rounded-2xl border border-slate-700">
                <p class="text-xs text-slate-500 mb-2 uppercase tracking-widest font-bold">範例 / Example</p>
                <div class="bg-slate-200 rounded-xl p-4 inline-block">
                    <p class="text-6xl font-black" style="color: #ef4444;">黑</p>
                </div>
                <p class="text-sm text-slate-400 mt-4">看到此字，你要唸：<span class="text-red-500 font-bold">「紅色」</span></p>
            </div>

            <div class="space-y-4">
                <button onclick="startGame(&#39;warmup&#39;)" class="w-full py-5 bg-gradient-to-r from-emerald-600 to-teal-600 text-white rounded-2xl text-xl font-black hover:from-emerald-500 hover:to-teal-500 transition-all transform hover:scale-[1.02] active:scale-95 shadow-xl btn-glow">
                    開始 15 題暖身模式
                </button>
                <button onclick="startGame(&#39;challenge&#39;)" class="w-full py-5 bg-gradient-to-r from-rose-600 to-red-600 text-white rounded-2xl text-xl font-black hover:from-rose-500 hover:to-red-500 transition-all transform hover:scale-[1.02] active:scale-95 shadow-xl btn-glow">
                    直接進入正式挑戰
                </button>
            </div>
        </div>

        <!-- 2. 暖身結束過渡畫面 -->
        <div id="transition-screen" class="hidden">
            <div class="text-6xl mb-6">☕</div>
            <h2 class="text-3xl font-black mb-4 text-white">暖身結束！</h2>
            <p class="text-slate-400 mb-8">
                大腦熱身好了嗎？<br>
                接下來是 <span class="text-rose-500 font-bold text-xl">20 題正式計分挑戰</span>。<br>
                看看你的精神狀態等級！
            </p>
            <button onclick="startGame(&#39;challenge&#39;)" class="w-full py-5 bg-gradient-to-r from-rose-600 to-red-600 text-white rounded-2xl text-2xl font-black hover:from-rose-500 hover:to-red-500 transition-all transform hover:scale-105 active:scale-95 shadow-2xl">
                開始挑戰
            </button>
        </div>

        <!-- 3. 遊戲畫面 -->
        <div id="play-screen" class="hidden">
            <div id="mode-indicator" class="mb-4 py-1 px-4 rounded-full text-xs font-black uppercase tracking-widest inline-block bg-rose-500/20 text-rose-400 border border-rose-500/30">正式挑戰 Challenge</div>

            <div class="flex justify-between items-center mb-6 bg-slate-800 p-4 rounded-2xl border border-slate-700">
                <div class="text-left">
                    <span class="text-slate-500 text-xs block font-bold uppercase tracking-tighter">Progress</span>
                    <span id="current-index" class="text-xl font-black text-white">7 / 20</span>
                </div>
                <div class="text-center">
                    <span class="text-slate-500 text-xs block font-bold uppercase tracking-tighter">Mistakes</span>
                    <span id="mistake-display" class="text-xl font-black text-rose-500">3</span>
                </div>
                <div class="text-right">
                    <span class="text-slate-500 text-xs block font-bold uppercase tracking-tighter">Time</span>
                    <span id="timer" class="text-xl font-black text-emerald-400">15.1s</span>
                </div>
            </div>

            <div class="h-64 flex items-center justify-center mb-8 bg-slate-200 rounded-3xl relative overflow-hidden shadow-inner">
                <div id="display-word" class="stroop-word select-none cursor-default font-black" style="color: rgb(0, 0, 0);">白</div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="recordMistake()" class="py-5 bg-slate-800 text-rose-500 rounded-2xl text-xl font-black hover:bg-slate-700 active:scale-95 transition-all border-2 border-rose-500/30">
                    ✕ 唸錯了
                </button>
                <button id="next-btn" onclick="nextWord()" class="py-5 bg-emerald-600 text-white rounded-2xl text-xl font-black hover:bg-emerald-500 active:scale-95 transition-all shadow-lg">
                    ✓ 下一題
                </button>
            </div>
            
            <button onclick="resetGame()" class="text-slate-500 text-sm hover:text-white transition">放棄並回主畫面</button>
        </div>

        <!-- 4. 結果畫面 -->
        <div id="result-screen" class="hidden text-center">
            <h1 class="text-4xl font-black mb-8 text-white tracking-tighter">診斷完成</h1>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                    <span class="text-slate-500 text-xs block font-bold uppercase mb-2">總計時間</span>
                    <span id="final-time" class="text-4xl font-black text-emerald-400">0.0s</span>
                </div>
                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                    <span class="text-slate-500 text-xs block font-bold uppercase mb-2">錯誤次數</span>
                    <span id="final-mistakes" class="text-4xl font-black text-rose-500">0</span>
                </div>
            </div>
            <div class="p-6 bg-slate-800/50 rounded-2xl mb-10 border border-slate-700">
                <p id="rank-text" class="text-white font-bold text-lg"></p>
            </div>
            <button onclick="resetGame()" class="w-full py-5 bg-white text-black rounded-2xl text-2xl font-black hover:bg-slate-200 transition-all transform hover:scale-105 shadow-xl">
                返回主選單
            </button>
        </div>
    </div>

    <script>
        // 核心題庫：文字內容與顏色不符
        const stroopData = [
            { text: "紅", color: "#3b82f6" }, { text: "橙", color: "#22c55e" },
            { text: "白", color: "#000000" }, { text: "黑", color: "#94a3b8" },
            { text: "藍", color: "#ef4444" }, { text: "紫", color: "#eab308" },
            { text: "黃", color: "#a855f7" }, { text: "綠", color: "#f97316" },
            { text: "橙", color: "#ef4444" }, { text: "紫", color: "#22c55e" },
            { text: "白", color: "#000000" }, { text: "綠", color: "#3b82f6" },
            { text: "藍", color: "#06b6d4" }, { text: "灰", color: "#ef4444" },
            { text: "紅", color: "#f97316" }, { text: "橙", color: "#10b981" },
            { text: "黑", color: "#ef4444" }, { text: "黃", color: "#64748b" },
            { text: "綠", color: "#a855f7" }, { text: "白", color: "#3b82f6" }
        ];

        let gameData = [];
        let currentIndex = 0;
        let mistakeCount = 0;
        let startTime = 0;
        let timerInterval;
        let currentPhase = 'warmup'; 

        const screens = ['start-screen', 'transition-screen', 'play-screen', 'result-screen'];

        function showScreen(screenId) {
            screens.forEach(id => {
                document.getElementById(id).classList.toggle('hidden', id !== screenId);
            });
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startGame(phase) {
            currentPhase = phase;
            const count = (phase === 'warmup') ? 15 : 20;
            
            // 隨機抽選題目
            gameData = [];
            for(let i=0; i<count; i++) {
                gameData.push(stroopData[Math.floor(Math.random() * stroopData.length)]);
            }
            
            currentIndex = 0;
            mistakeCount = 0;
            startTime = Date.now();
            
            showScreen('play-screen');
            updateUI();
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                document.getElementById('timer').innerText = elapsed.toFixed(1) + 's';
            }, 100);
        }

        function updateUI() {
            const data = gameData[currentIndex];
            const displayWord = document.getElementById('display-word');
            const modeIndicator = document.getElementById('mode-indicator');
            
            displayWord.innerText = data.text;
            displayWord.style.color = data.color;
            document.getElementById('current-index').innerText = `${currentIndex + 1} / ${gameData.length}`;
            document.getElementById('mistake-display').innerText = mistakeCount;

            if (currentPhase === 'warmup') {
                modeIndicator.innerText = "暖身階段 Warm Up";
                modeIndicator.className = "mb-4 py-1 px-4 rounded-full text-xs font-black uppercase tracking-widest inline-block bg-emerald-500/20 text-emerald-400 border border-emerald-500/30";
            } else {
                modeIndicator.innerText = "正式挑戰 Challenge";
                modeIndicator.className = "mb-4 py-1 px-4 rounded-full text-xs font-black uppercase tracking-widest inline-block bg-rose-500/20 text-rose-400 border border-rose-500/30";
            }
        }

        function recordMistake() {
            mistakeCount++;
            document.getElementById('mistake-display').innerText = mistakeCount;
            document.getElementById('display-word').classList.add('flash-red');
            document.getElementById('game-container').classList.add('shake');
            setTimeout(() => {
                document.getElementById('display-word').classList.remove('flash-red');
                document.getElementById('game-container').classList.remove('shake');
            }, 300);
        }

        function nextWord() {
            currentIndex++;
            if (currentIndex < gameData.length) {
                updateUI();
            } else {
                if (currentPhase === 'warmup') {
                    clearInterval(timerInterval);
                    showScreen('transition-screen');
                } else {
                    endGame();
                }
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
            showScreen('result-screen');
            document.getElementById('final-time').innerText = totalTime + 's';
            document.getElementById('final-mistakes').innerText = mistakeCount;

            let rank = "";
            if (mistakeCount === 0 && totalTime < 15) rank = "【神經超載】你簡直是處理速度的奇蹟！";
            else if (mistakeCount <= 2 && totalTime < 25) rank = "【異常清醒】表現非常優秀，大腦切換自如。";
            else if (mistakeCount > 5) rank = "【精神錯亂】文字徹底贏了這場戰爭。";
            else rank = "【診斷完成】恭喜通過測試，你的反應符合常人標準。";
            
            document.getElementById('rank-text').innerText = rank;
        }

        function resetGame() {
            clearInterval(timerInterval);
            showScreen('start-screen');
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('play-screen').classList.contains('hidden')) return;
            if (e.code === 'Space' || e.code === 'ArrowRight') nextWord();
            if (e.code === 'KeyF' || e.code === 'ArrowLeft') recordMistake();
        });
    </script>

</body></html>
