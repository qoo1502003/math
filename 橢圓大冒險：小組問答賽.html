<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>橢圓大冒險：四組問答賽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f4f8; }
        .math-font { font-family: 'Noto Serif TC', serif; font-style: italic; }
        
        .grid-card { transition: all 0.3s ease; cursor: pointer; }
        .grid-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .grid-card.disabled { background-color: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; opacity: 0.6; }
        
        .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }

        /* 分數樣式 */
        .frac {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            margin: 0 0.2em;
        }
        .frac .top {
            border-bottom: 2px solid #334155;
            padding: 0 0.3em;
            line-height: 1.1;
        }
        .frac .bottom {
            padding: 0 0.3em;
            line-height: 1.1;
        }
        .math-expr {
            display: inline-flex;
            align-items: center;
            font-size: 1.1em;
            color: #1e293b;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- 初始設置介面 -->
    <div id="setup-screen" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl mt-10">
        <h1 class="text-3xl font-bold text-blue-600 mb-6 text-center">橢圓大冒險：四組賽</h1>
        <p class="text-gray-600 mb-6 text-center">請輸入四組的參賽隊名：</p>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">第一組</label>
                <input type="text" id="team1-input" value="第一隊" class="mt-1 block w-full px-4 py-2 border rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">第二組</label>
                <input type="text" id="team2-input" value="第二隊" class="mt-1 block w-full px-4 py-2 border rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">第三組</label>
                <input type="text" id="team3-input" value="第三隊" class="mt-1 block w-full px-4 py-2 border rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">第四組</label>
                <input type="text" id="team4-input" value="第四隊" class="mt-1 block w-full px-4 py-2 border rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button onclick="startGame()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">開始遊戲</button>
        </div>
    </div>

    <!-- 遊戲主畫面 -->
    <div id="game-screen" class="hidden max-w-6xl mx-auto">
        <!-- 計分板 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div id="score-box-0" class="bg-blue-100 p-4 rounded-xl border-4 border-blue-500 text-center">
                <div id="team-name-0" class="font-bold text-lg text-blue-800">第一隊</div>
                <div id="score-0" class="text-4xl font-black text-blue-600">0</div>
            </div>
            <div id="score-box-1" class="bg-green-100 p-4 rounded-xl border-4 border-transparent text-center">
                <div id="team-name-1" class="font-bold text-lg text-green-800">第二隊</div>
                <div id="score-1" class="text-4xl font-black text-green-600">0</div>
            </div>
            <div id="score-box-2" class="bg-purple-100 p-4 rounded-xl border-4 border-transparent text-center">
                <div id="team-name-2" class="font-bold text-lg text-purple-800">第三隊</div>
                <div id="score-2" class="text-4xl font-black text-purple-600">0</div>
            </div>
            <div id="score-box-3" class="bg-orange-100 p-4 rounded-xl border-4 border-transparent text-center">
                <div id="team-name-3" class="font-bold text-lg text-orange-800">第四隊</div>
                <div id="score-3" class="text-4xl font-black text-orange-600">0</div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h2 class="text-2xl font-bold text-gray-700">輪到：<span id="current-turn-name" class="text-blue-600">隊名</span> 挑選題目</h2>
            <button onclick="endGame()" class="bg-red-500 text-white px-8 py-3 rounded-lg font-bold hover:bg-red-600 shadow-lg">終止遊戲並結算</button>
        </div>

        <!-- 題目矩陣 -->
        <div class="grid grid-cols-5 gap-3">
            <div class="bg-slate-700 text-white p-3 rounded-t-lg text-center font-bold">基本定義</div>
            <div class="bg-slate-700 text-white p-3 rounded-t-lg text-center font-bold">標準式判斷</div>
            <div class="bg-slate-700 text-white p-3 rounded-t-lg text-center font-bold">中心與頂點</div>
            <div class="bg-slate-700 text-white p-3 rounded-t-lg text-center font-bold">長短軸長</div>
            <div class="bg-slate-700 text-white p-3 rounded-t-lg text-center font-bold">綜合應用</div>

            <!-- 分數按鈕生成 -->
            <script>
                for(let row=1; row<=5; row++) {
                    for(let col=0; col<5; col++) {
                        document.write(`<div class="grid-card bg-white py-8 rounded-lg text-center font-black text-2xl border-2 border-slate-200 text-blue-500" onclick="showQuestion(${col}, ${row*100}, this)">${row*100}</div>`);
                    }
                }
            </script>
        </div>
    </div>

    <!-- 題目彈出框 -->
    <div id="question-modal" class="modal items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl max-w-2xl w-full animate-pop shadow-2xl overflow-y-auto max-h-[90vh]">
            <div id="modal-title" class="text-sm font-bold text-blue-500 mb-2 uppercase tracking-widest">CATEGORY - 100 POINTS</div>
            
            <div class="mb-10 text-center">
                <div id="modal-question" class="text-3xl font-bold text-gray-800 mb-8 leading-relaxed">題目載入中...</div>
                
                <button id="btn-show-answer" onclick="revealAnswer()" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-slate-900 transition shadow-md">顯示答案</button>
            </div>

            <div id="answer-container" class="hidden text-center border-t pt-8">
                <div class="text-gray-500 text-sm font-bold mb-2">正確答案：</div>
                <div id="modal-answer" class="text-3xl font-black text-green-600 mb-10">答案內容</div>
                
                <div class="flex gap-4 justify-center">
                    <button onclick="recordScore(true)" class="bg-green-500 text-white px-8 py-4 rounded-2xl font-black text-xl hover:bg-green-600 shadow-lg flex-1">答對了！(+分)</button>
                    <button onclick="recordScore(false)" class="bg-red-500 text-white px-8 py-4 rounded-2xl font-black text-xl hover:bg-red-600 shadow-lg flex-1">答錯了 (+0)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 結算畫面 -->
    <div id="result-screen" class="hidden max-w-md mx-auto bg-white p-10 rounded-2xl shadow-2xl text-center mt-10">
        <h1 class="text-4xl font-black text-yellow-500 mb-4">🏆 遊戲結束 🏆</h1>
        <div id="final-ranking" class="space-y-4 mb-8"></div>
        <button onclick="location.reload()" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-slate-900">重新開始遊戲</button>
    </div>

    <script>
        function getFrac(num, den) {
            return `<span class="frac"><span class="top math-font">${num}</span><span class="bottom math-font">${den}</span></span>`;
        }

        const questions = {
            0: { // 基本定義
                100: { q: "橢圓定義：平面上到兩定點的距離和為定值 <span class=\"math-font\">2a</span>。這兩個定點稱為什麼？", ans: "焦點" },
                200: { q: "要畫出一個橢圓，距離和 <span class=\"math-font\">2a</span> 必須比焦距 <span class=\"math-font\">2c</span> 還要大還是小？", ans: "還要大 (2a > 2c)" },
                300: { q: "橢圓上任何一點到兩個焦點的『距離總和』，剛好等於什麼長度？", ans: "長軸長 (2a)" },
                400: { q: "在橢圓中，<span class=\"math-font\">a、b、c</span> 三個字母的平方關係式為何？", ans: "a² = b² + c²" },
                500: { q: "若兩定點距離為 10，動點到這兩點距離和為 8，此動點『無法』形成圖形，是因為距離和比焦距還要？", ans: "還要小" }
            },
            1: { // 標準式判斷
                100: { q: `方程式 <span class="math-expr">${getFrac('x²', 25)} + ${getFrac('y²', 16)} = 1</span> 是左右橫向還是上下直立的橢圓？`, ans: "左右橫向" },
                200: { q: `方程式 <span class="math-expr">${getFrac('x²', 9)} + ${getFrac('y²', 16)} = 1</span> 的長軸是在哪個軸上？`, ans: "y 軸" },
                300: { q: `在標準式中，如果 <span class="math-font\">x</span> 下方的分母比較大，代表橢圓是橫向還是直向？`, ans: "橫向" },
                400: { q: "標準式中，分母比較大的那個數字，通常被我們設定成哪一個字母的平方？", ans: "a²" },
                500: { q: "將一般式 <span class=\"math-font\">4x² + 9y² = 36</span> 兩邊除以 36，可以得到標準式。它是橫向還是直向？", ans: "橫向" }
            },
            2: { // 中心與頂點
                100: { q: `中心在原點的橢圓，其中心坐標寫作？`, ans: "(0, 0)" },
                200: { q: `橢圓 <span class="math-expr">${getFrac('(x - 3)²', 100)} + ${getFrac('(y + 1)²', 36)} = 1</span> 的中心坐標在哪裡？`, ans: "(3, -1)" },
                300: { q: `橢圓 <span class="math-expr">${getFrac('x²', 16)} + ${getFrac('y²', 25)} = 1</span> 的長軸頂點是在 <span class="math-font">x</span> 軸還是 <span class="math-font">y</span> 軸上？`, ans: "y 軸" },
                400: { q: "橢圓的中心剛好位在兩個焦點的哪一個位置上？", ans: "中點" },
                500: { q: "一個橢圓總共有幾個端點（包含長軸與短軸的頂點）？", ans: "4 個" }
            },
            3: { // 長短軸長
                100: { q: `橢圓 <span class="math-expr">${getFrac('x²', 25)} + ${getFrac('y²', 9)} = 1</span>，請問半長軸長 <span class="math-font">a</span> 等於多少？`, ans: "5" },
                200: { q: `橢圓 <span class="math-expr">${getFrac('x²', 16)} + ${getFrac('y²', 25)} = 1</span>，其『長軸總長度』是多少？`, ans: "10" },
                300: { q: "已知一個橢圓的長軸長為 26，短軸長為 24，則半短軸長 <span class=\"math-font\">b</span> 為多少？", ans: "12" },
                400: { q: "若一橢圓的 <span class=\"math-font\">a = 10，b = 8</span>，請問中心到焦點的距離 <span class=\"math-font\">c</span> 為多少？", ans: "6" },
                500: { q: "通過焦點並垂直長軸的弦叫做『正焦弦』，它的長度計算公式為何？", ans: "2b²/a" }
            },
            4: { // 綜合應用
                100: { q: "生活中常見的雞蛋橫切面，最接近哪一種數學圖形？", ans: "橢圓" },
                200: { q: "畫橢圓時，若用繩子固定兩根釘子來畫，這兩根釘子代表橢圓的什麼？", ans: "焦點" },
                300: { q: "若橢圓的中心坐標為 (0, 0)，其中一個焦點在 (4, 0)，則另一個焦點坐標為何？", ans: "(-4, 0)" },
                400: { q: "橢圓上有一點到兩焦點的距離分別為 3 和 7，請問這橢圓的長軸長是多少？", ans: "10" },
                500: { q: "在一個左右橫向的橢圓中，長軸是水平的還是鉛直的？", ans: "水平的" }
            }
        };

        let teams = [
            { name: "第一隊", score: 0 }, 
            { name: "第二隊", score: 0 }, 
            { name: "第三隊", score: 0 },
            { name: "第四隊", score: 0 }
        ];
        let currentTurn = 0, currentPoints = 0, answeredCount = 0;
        const categoryNames = ["基本定義", "標準式判斷", "中心與頂點", "長短軸長", "綜合應用"];

        function startGame() {
            for(let i=0; i<4; i++) {
                const name = document.getElementById(`team${i+1}-input`).value;
                teams[i].name = name || `第${i+1}組`;
                document.getElementById(`team-name-${i}`).innerText = teams[i].name;
            }
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            updateTurnDisplay();
        }

        function updateTurnDisplay() {
            const display = document.getElementById('current-turn-name');
            display.innerText = teams[currentTurn].name;
            
            const colors = ["text-blue-600", "text-green-600", "text-purple-600", "text-orange-600"];
            display.className = colors[currentTurn];
            
            const borderColors = ["#3b82f6", "#22c55e", "#a855f7", "#f97316"];
            
            for(let i=0; i<4; i++) {
                const box = document.getElementById(`score-box-${i}`);
                if (i === currentTurn) {
                    box.style.borderColor = borderColors[i];
                    box.classList.add('shadow-lg');
                } else {
                    box.style.borderColor = 'transparent';
                    box.classList.remove('shadow-lg');
                }
            }
        }

        function showQuestion(catIndex, points, el) {
            if (el.classList.contains('disabled')) return;
            el.classList.add('disabled');
            currentPoints = points;
            const qData = questions[catIndex][points];

            document.getElementById('modal-title').innerText = `${categoryNames[catIndex]} - ${points} 分`;
            document.getElementById('modal-question').innerHTML = qData.q;
            document.getElementById('modal-answer').innerHTML = qData.ans;
            
            document.getElementById('answer-container').classList.add('hidden');
            document.getElementById('btn-show-answer').classList.remove('hidden');
            document.getElementById('question-modal').style.display = 'flex';
        }

        function revealAnswer() {
            document.getElementById('btn-show-answer').classList.add('hidden');
            document.getElementById('answer-container').classList.remove('hidden');
        }

        function recordScore(isCorrect) {
            if (isCorrect) {
                teams[currentTurn].score += currentPoints;
                document.getElementById(`score-${currentTurn}`).innerText = teams[currentTurn].score;
            }
            closeModal();
        }

        function closeModal() {
            document.getElementById('question-modal').style.display = 'none';
            currentTurn = (currentTurn + 1) % 4;
            updateTurnDisplay();
            answeredCount++;
            if (answeredCount === 25) endGame();
        }

        function endGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const sorted = [...teams].sort((a,b) => b.score - a.score);
            const container = document.getElementById('final-ranking');
            container.innerHTML = sorted.map((t, i) => `
                <div class="p-5 rounded-2xl flex justify-between items-center ${i===0?'bg-yellow-50 border-4 border-yellow-400 scale-105 mb-4 shadow-lg':'bg-slate-50 border-2 border-slate-200'}">
                    <div class="flex items-center"><span class="text-3xl mr-4">${i===0?'🏆':i+1}</span><span class="font-black text-2xl">${t.name}</span></div>
                    <span class="text-3xl font-black text-blue-700">${t.score} PTS</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
