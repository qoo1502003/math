<body class="h-screen flex flex-col text-slate-800">

    <!-- 1. 頂部導覽列 (固定高度) -->
    <nav class="bg-white shadow-sm z-20 flex-none border-b">
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-3 overflow-x-auto no-scrollbar whitespace-nowrap">
                <span class="font-bold text-blue-600 border-r pr-3">斜率練習</span>
                <div id="nav-btns" class="flex gap-2"><button class="px-4 py-1.5 rounded-xl font-bold transition flex-shrink-0 bg-blue-600 text-white shadow-md">題 1</button><button class="px-4 py-1.5 rounded-xl font-bold transition flex-shrink-0 bg-slate-200 text-slate-500 hover:bg-slate-300">題 2</button><button class="px-4 py-1.5 rounded-xl font-bold transition flex-shrink-0 bg-slate-200 text-slate-500 hover:bg-slate-300">題 3</button><button class="px-4 py-1.5 rounded-xl font-bold transition flex-shrink-0 bg-slate-200 text-slate-500 hover:bg-slate-300">題 4</button><button class="px-4 py-1.5 rounded-xl font-bold transition flex-shrink-0 bg-slate-200 text-slate-500 hover:bg-slate-300">題 5</button><button class="px-4 py-1.5 rounded-xl font-bold transition flex-shrink-0 bg-slate-200 text-slate-500 hover:bg-slate-300">題 6</button><button class="px-4 py-1.5 rounded-xl font-bold transition flex-shrink-0 bg-slate-200 text-slate-500 hover:bg-slate-300">題 7</button><button class="px-4 py-1.5 rounded-xl font-bold transition flex-shrink-0 bg-slate-200 text-slate-500 hover:bg-slate-300">題 8</button><button class="px-4 py-1.5 rounded-xl font-bold transition flex-shrink-0 bg-slate-200 text-slate-500 hover:bg-slate-300">題 9</button><button class="px-4 py-1.5 rounded-xl font-bold transition flex-shrink-0 bg-slate-200 text-slate-500 hover:bg-slate-300">題 10</button></div>
            </div>
            <div class="flex items-center gap-3 text-sm font-bold">
                <div class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full">得分: <span id="total-score">0</span></div>
                <div class="bg-red-50 text-red-600 px-3 py-1 rounded-full">⏱ <span id="timer">06:03</span></div>
            </div>
        </div>
    </nav>

    <!-- 2. 中間內容區 (自動填滿剩餘高度，可滾動) -->
    <main class="flex-1 overflow-hidden flex flex-col md:flex-row">
        
        <!-- 左側：題目區 -->
        <section id="question-panel" class="w-full md:w-1/3 bg-slate-50 p-5 border-b md:border-b-0 md:border-r overflow-y-auto">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <span class="w-2 h-6 bg-blue-500 rounded-full"></span> 題目內容
            </h2>
            
            <div class="mb-6 p-4 bg-white rounded-2xl border border-slate-200 text-center shadow-sm">
                <p class="text-xs text-slate-400 font-bold mb-2 tracking-widest uppercase">Formula Info</p>
                <div class="math" style="font-size: 28px;">
                    m = <div class="fraction"><span>Δy (縱)</span><span>Δx (橫)</span></div>
                </div>
            </div>

            <div id="question-content" class="space-y-4">
                <div class="text-md font-bold text-blue-600 mb-1">一、給兩點求斜率</div>
                <div class="text-slate-700 leading-relaxed text-lg">直線通過 <mark class="bg-yellow-100 px-1 rounded">A(0, 1)</mark> 及 <mark class="bg-yellow-100 px-1 rounded">B(-2, -3)</mark>，求斜率。</div>
            </div>
        </section>

        <!-- 右側：解題步驟區 -->
        <section id="steps-panel" class="w-full md:w-2/3 p-5 overflow-y-auto bg-white scroll-smooth">
            <div id="steps-container" class="max-w-2xl mx-auto space-y-6 pb-10"><div class="p-6 rounded-3xl border-2 transition-all border-blue-400 bg-blue-50 shadow-sm step-enter">
                <div class="flex items-center mb-4">
                    <span class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold text-sm mr-3 shadow-sm">1</span>
                    <h3 class="font-bold text-slate-700">將 y 相減放分子，x 相減放分母： </h3>
                </div>
                <div class="flex justify-center bg-white p-6 rounded-2xl border border-blue-100 shadow-inner overflow-x-auto"><div class="math">m<sub>AB</sub> = <div class="fraction"><span><div class="slot" data-idx="0"></div> － <div class="slot" data-idx="1"></div></span><span><div class="slot" data-idx="2"></div> － <div class="slot" data-idx="3"></div></span></div></div></div>
            </div></div>
        </section>

    </main>

    <!-- 3. 底部操作區 (固定高度，永不與題目重疊) -->
    <div id="controls-container" class="flex-none bg-slate-100 border-t p-4 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] transition-all duration-300 translate-y-0">
        <div class="max-w-4xl mx-auto">
            <div id="options-grid" class="flex flex-wrap justify-center gap-2 mb-4"><button class="px-6 py-3 bg-white border-2 border-slate-300 rounded-2xl text-xl font-bold text-slate-700 hover:border-blue-500 hover:bg-blue-50 shadow-sm option-btn">-3</button><button class="px-6 py-3 bg-white border-2 border-slate-300 rounded-2xl text-xl font-bold text-slate-700 hover:border-blue-500 hover:bg-blue-50 shadow-sm option-btn">-2</button><button class="px-6 py-3 bg-white border-2 border-slate-300 rounded-2xl text-xl font-bold text-slate-700 hover:border-blue-500 hover:bg-blue-50 shadow-sm option-btn">1</button><button class="px-6 py-3 bg-white border-2 border-slate-300 rounded-2xl text-xl font-bold text-slate-700 hover:border-blue-500 hover:bg-blue-50 shadow-sm option-btn">2</button><button class="px-6 py-3 bg-white border-2 border-slate-300 rounded-2xl text-xl font-bold text-slate-700 hover:border-blue-500 hover:bg-blue-50 shadow-sm option-btn">-4</button><button class="px-6 py-3 bg-white border-2 border-slate-300 rounded-2xl text-xl font-bold text-slate-700 hover:border-blue-500 hover:bg-blue-50 shadow-sm option-btn">0</button></div>
            <div class="flex justify-between items-center gap-4">
                <button onclick="resetCurrentStep()" class="px-5 py-3 bg-slate-200 text-slate-600 rounded-xl font-bold hover:bg-slate-300">此步重來</button>
                <div id="step-feedback" class="flex-1 text-center font-bold text-lg"></div>
                <button id="check-btn" onclick="checkAnswer()" class="px-10 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg">檢查答案</button>
            </div>
        </div>
    </div>

    <!-- 完成彈窗 -->
    <div id="finish-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 p-6 backdrop-blur-sm" style="display: none;">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-2xl font-bold mb-2 text-slate-800">挑戰完成！</h2>
            <p class="text-slate-500 mb-6">你對直線斜率已經非常熟悉了</p>
            <div class="bg-blue-50 rounded-2xl p-4 mb-6">
                <div class="text-blue-600 font-bold">總得分：<span id="final-score" class="text-2xl">0</span></div>
                <div class="text-slate-500 text-sm mt-1">作答時間：<span id="final-time">7分0秒</span></div>
            </div>
            <div class="flex gap-3">
                <button onclick="restartApp()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-md">再玩一次</button>
                <button onclick="closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold">關閉</button>
            </div>
        </div>
    </div>

    <script>
        const appData = [
            // 第一類：給兩點求斜率
            { id: 0, title: "題 1", topic: "一、給兩點求斜率", desc: "直線通過 <mark class='bg-yellow-100 px-1 rounded'>A(0, 1)</mark> 及 <mark class='bg-yellow-100 px-1 rounded'>B(-2, -3)</mark>，求斜率。", type: "findSlope", pts: ["A", "B"], ans: ["-3", "1", "-2", "0", "-4", "-2", "2"], options: ["-3", "1", "-2", "0", "-4", "-2", "2"] },
            { id: 1, title: "題 2", topic: "一、給兩點求斜率", desc: "直線通過 <mark class='bg-yellow-100 px-1 rounded'>C(2, 3)</mark> 及 <mark class='bg-yellow-100 px-1 rounded'>D(4, 7)</mark>，求斜率。", type: "findSlope", pts: ["C", "D"], ans: ["7", "3", "4", "2", "4", "2", "2"], options: ["7", "3", "4", "2", "6"] },
            { id: 2, title: "題 3", topic: "一、給兩點求斜率", desc: "直線通過 <mark class='bg-yellow-100 px-1 rounded'>E(1, -2)</mark> 及 <mark class='bg-yellow-100 px-1 rounded'>F(3, 2)</mark>，求斜率。", type: "findSlope", pts: ["E", "F"], ans: ["2", "-2", "3", "1", "4", "2", "2"], options: ["2", "-2", "3", "1", "4", "0"] },
            { id: 3, title: "題 4", topic: "一、給兩點求斜率", desc: "直線通過 <mark class='bg-yellow-100 px-1 rounded'>G(-1, 5)</mark> 及 <mark class='bg-yellow-100 px-1 rounded'>H(2, -1)</mark>，求斜率。", type: "findSlope", pts: ["G", "H"], ans: ["-1", "5", "2", "-1", "-6", "3", "-2"], options: ["-1", "5", "2", "-6", "3", "-2"] },
            { id: 4, title: "題 5", topic: "一、給兩點求斜率", desc: "直線通過 <mark class='bg-yellow-100 px-1 rounded'>I(3, 1)</mark> 及 <mark class='bg-yellow-100 px-1 rounded'>J(6, 2)</mark>，求斜率。", type: "findSlope", pts: ["I", "J"], ans: ["2", "1", "6", "3", "1", "3", "1", "3"], isFractionAns: true, options: ["2", "1", "6", "3", "5"] },

            // 第二類：給斜率求點
            { id: 5, title: "題 6", topic: "二、給斜率求點", desc: "過 <mark class='bg-yellow-100 px-1 rounded'>P(a, 2)</mark> 及 <mark class='bg-yellow-100 px-1 rounded'>Q(-2, -1)</mark> 斜率為 <span class='math' style='font-size:20px;'><div class='fraction'><span>1</span><span>3</span></div></span>，求 a = ?", type: "findPoint", pts: ["P", "Q"], mVal: {n:1, d:3}, ans: ["-1", "2", "-2", "a", "3", "-1", "2", "1", "-2", "a", "-9", "-2", "a", "7"], options: ["-1", "2", "-2", "a", "3", "1", "-9", "7"] },
            { id: 6, title: "題 7", topic: "二、給斜率求點", desc: "過 <mark class='bg-yellow-100 px-1 rounded'>P(3, k)</mark> 及 <mark class='bg-yellow-100 px-1 rounded'>Q(1, 5)</mark> 斜率為 <span class='math' style='font-size:20px;'>2</span>，求 k = ?", type: "findPoint", pts: ["P", "Q"], mVal: {n:2, d:1}, ans: ["5", "k", "1", "3", "1", "5", "k", "2", "1", "3", "-4", "5", "k", "9"], options: ["5", "k", "1", "3", "2", "-4", "9"] },
            { id: 7, title: "題 8", topic: "二、給斜率求點", desc: "過 <mark class='bg-yellow-100 px-1 rounded'>P(x, 1)</mark> 及 <mark class='bg-yellow-100 px-1 rounded'>Q(-2, -5)</mark> 斜率為 <span class='math' style='font-size:20px;'>3</span>，求 x = ?", type: "findPoint", pts: ["P", "Q"], mVal: {n:3, d:1}, ans: ["-5", "1", "-2", "x", "1", "-5", "1", "3", "-2", "x", "-6", "-6", "3x", "0"], options: ["-5", "1", "-2", "x", "3", "-6", "3x", "0"] },
            { id: 8, title: "題 9", topic: "二、給斜率求點", desc: "過 <mark class='bg-yellow-100 px-1 rounded'>P(4, 2)</mark> 及 <mark class='bg-yellow-100 px-1 rounded'>Q(a, -1)</mark> 斜率為 <div class='math' style='font-size:20px;'><div class='fraction'><span>1</span><span>2</span></div></div>，求 a = ?", type: "findPoint", pts: ["P", "Q"], mVal: {n:1, d:2}, ans: ["-1", "2", "a", "4", "2", "-1", "2", "1", "a", "4", "-6", "a", "4", "-2"], options: ["-1", "2", "a", "4", "1", "-6", "-2"] },
            { id: 9, title: "題 10", topic: "二、給斜率求點", desc: "過 <mark class='bg-yellow-100 px-1 rounded'>P(0, y)</mark> 及 <mark class='bg-yellow-100 px-1 rounded'>Q(4, 3)</mark> 斜率為 <div class='math' style='font-size:20px;'><div class='fraction'><span>3</span><span>4</span></div></div>，求 y = ?", type: "findPoint", pts: ["P", "Q"], mVal: {n:3, d:4}, ans: ["3", "y", "4", "0", "4", "3", "y", "3", "4", "0", "12", "12", "4y", "0"], options: ["3", "y", "4", "0", "12", "4y", "0", "3y"] }
        ];

        let currentQIndex = 0;
        let scores = appData.map(() => 0);
        let completedSteps = appData.map(() => 0);
        let timeLeft = 420;
        let timerId = null;

        window.onload = () => { initNav(); renderQuestion(); startTimer(); };

        function initNav() {
            const nav = document.getElementById('nav-btns');
            nav.innerHTML = '';
            appData.forEach((q, idx) => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-1.5 rounded-xl font-bold transition flex-shrink-0 ${idx === currentQIndex ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-200 text-slate-500 hover:bg-slate-300'}`;
                btn.innerText = q.title;
                btn.onclick = () => switchQuestion(idx);
                nav.appendChild(btn);
            });
        }

        function switchQuestion(idx) { currentQIndex = idx; initNav(); renderQuestion(); }

        function renderQuestion() {
            const q = appData[currentQIndex];
            document.getElementById('question-content').innerHTML = `
                <div class="text-md font-bold text-blue-600 mb-1">${q.topic}</div>
                <div class="text-slate-700 leading-relaxed text-lg">${q.desc}</div>
            `;
            const container = document.getElementById('steps-container');
            container.innerHTML = '';
            const steps = generateSteps(q);
            const maxStep = completedSteps[currentQIndex];
            for (let i = 0; i <= maxStep; i++) {
                if (i >= steps.length) break;
                addStepElement(steps[i], i === maxStep, i < maxStep);
            }
            updateControls(steps);
        }

        function generateSteps(q) {
            const sub = q.pts.join("");
            if (q.type === "findSlope") {
                return [
                    { id: 1, instruction: "將 y 相減放分子，x 相減放分母：", slots: q.ans.slice(0, 4), display: `<div class="math">m<sub>${sub}</sub> = <div class="fraction"><span><div class="slot" data-idx="0"></div> － <div class="slot" data-idx="1"></div></span><span><div class="slot" data-idx="2"></div> － <div class="slot" data-idx="3"></div></span></div></div>`, options: q.options },
                    { id: 2, instruction: "計算分組數值：", slots: q.ans.slice(4, 6), display: `<div class="math">m<sub>${sub}</sub> = <div class="fraction"><span><div class="slot" data-idx="0"></div></span><span><div class="slot" data-idx="1"></div></span></div></div>`, options: q.options },
                    { id: 3, instruction: "化簡求出斜率：", slots: q.isFractionAns ? q.ans.slice(6) : [q.ans[6]], display: q.isFractionAns ? `<div class="math">m<sub>${sub}</sub> = <div class="fraction"><span><div class="slot" data-idx="0"></div></span><span><div class="slot" data-idx="1"></div></span></div></div>` : `<div class="math">m<sub>${sub}</sub> = <div class="slot" data-idx="0"></div></div>`, options: q.options }
                ];
            } else {
                const mStr = q.mVal.d === 1 ? q.mVal.n : `<div class="fraction"><span>${q.mVal.n}</span><span>${q.mVal.d}</span></div>`;
                return [
                    { id: 1, instruction: "列出斜率等式：", slots: q.ans.slice(0, 4), display: `<div class="math">m<sub>${sub}</sub> = <div class="fraction"><span><div class="slot" data-idx="0"></div> － <div class="slot" data-idx="1"></div></span><span><div class="slot" data-idx="2"></div> － <div class="slot" data-idx="3"></div></span></div> = ${mStr}</div>`, options: q.options },
                    { id: 2, instruction: "交叉相乘：", slots: q.ans.slice(4, 10), display: `<div class="math" style="font-size:22px;"><div class="slot" data-idx="0"></div> × (<div class="slot" data-idx="1"></div> － <div class="slot" data-idx="2"></div>) = <div class="slot" data-idx="3"></div> × (<div class="slot" data-idx="4"></div> － <div class="slot" data-idx="5"></div>)</div>`, options: q.options },
                    { id: 3, instruction: "展開並化簡：", slots: q.ans.slice(10, 13), display: `<div class="math"><div class="slot" data-idx="0"></div> = <div class="slot" data-idx="1"></div> － <div class="slot" data-idx="2"></div></div>`, options: q.options },
                    { id: 4, instruction: "最後解出未知數：", slots: [q.ans[13]], display: `<div class="math">解答 = <div class="slot" data-idx="0"></div></div>`, options: q.options }
                ];
            }
        }

        function addStepElement(step, isActive, isDone) {
            const container = document.getElementById('steps-container');
            const div = document.createElement('div');
            div.className = `p-6 rounded-3xl border-2 transition-all ${isActive ? 'border-blue-400 bg-blue-50 shadow-sm step-enter' : 'border-slate-100 bg-slate-50 opacity-60'}`;
            div.innerHTML = `
                <div class="flex items-center mb-4">
                    <span class="w-8 h-8 rounded-full ${isDone ? 'bg-green-500' : 'bg-blue-500'} text-white flex items-center justify-center font-bold text-sm mr-3 shadow-sm">${isDone ? '✔' : step.id}</span>
                    <h3 class="font-bold text-slate-700">${step.instruction} ${isDone ? '<span class="text-green-600 ml-1">完成</span>' : ''}</h3>
                </div>
                <div class="flex justify-center bg-white p-6 rounded-2xl border border-blue-100 shadow-inner overflow-x-auto">${step.display}</div>
            `;
            container.appendChild(div);
            if (isDone) {
                div.querySelectorAll('.slot').forEach(s => {
                    const idx = s.getAttribute('data-idx');
                    s.innerText = step.slots[idx];
                    s.classList.add('filled', 'correct');
                });
            }
            if (isActive) div.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        function updateControls(steps) {
            const currentStepIdx = completedSteps[currentQIndex];
            const panel = document.getElementById('controls-container');
            if (currentStepIdx >= steps.length) {
                panel.classList.add('opacity-50', 'pointer-events-none');
                checkAllFinished();
                return;
            }
            panel.classList.remove('opacity-50', 'pointer-events-none');
            const step = steps[currentStepIdx];
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            const allNeeded = [...new Set([...step.options, ...step.slots])];
            allNeeded.sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "px-6 py-3 bg-white border-2 border-slate-300 rounded-2xl text-xl font-bold text-slate-700 hover:border-blue-500 hover:bg-blue-50 shadow-sm option-btn";
                btn.innerText = opt;
                btn.onclick = () => fillSlot(opt);
                grid.appendChild(btn);
            });
            document.getElementById('step-feedback').innerText = '';
        }

        function fillSlot(val) {
            const slots = document.getElementById('steps-container').lastElementChild.querySelectorAll('.slot');
            for (let slot of slots) {
                if (!slot.innerText) {
                    slot.innerText = val;
                    slot.classList.add('filled');
                    break;
                }
            }
        }

        function resetCurrentStep() {
            document.getElementById('steps-container').lastElementChild.querySelectorAll('.slot').forEach(s => {
                s.innerText = '';
                s.classList.remove('filled', 'correct');
            });
            document.getElementById('step-feedback').innerText = '';
        }

        function checkAnswer() {
            const q = appData[currentQIndex];
            const currentStepIdx = completedSteps[currentQIndex];
            const steps = generateSteps(q);
            const step = steps[currentStepIdx];
            const activeStepEl = document.getElementById('steps-container').lastElementChild;
            const slots = Array.from(activeStepEl.querySelectorAll('.slot'));
            const userValues = slots.map(s => s.innerText);

            if (userValues.some(v => !v)) {
                showFeedback("請填滿所有空格", "text-orange-500");
                return;
            }

            let isCorrect = false;
            // 交叉相乘智慧判定
            if (step.id === 2 && q.type === "findPoint") {
                const [u0, u1, u2, u3, u4, u5] = userValues;
                const [a0, a1, a2, a3, a4, a5] = step.slots;
                const checkPair = (ua, ub, uc, aa, ab, ac) => ua == aa && ub == ab && uc == ac;
                const matchNormal = checkPair(u0, u1, u2, a0, a1, a2) && checkPair(u3, u4, u5, a3, a4, a5);
                const matchReverse = checkPair(u0, u1, u2, a3, a4, a5) && checkPair(u3, u4, u5, a0, a1, a2);
                isCorrect = matchNormal || matchReverse;
            } else {
                isCorrect = userValues.every((val, idx) => val == step.slots[idx]);
            }

            if (isCorrect) {
                showFeedback("✔ 答對了！下一個步驟", "text-green-600");
                updateScore(1);
                completedSteps[currentQIndex]++;
                setTimeout(() => renderQuestion(), 800);
            } else {
                showFeedback("❌ 再檢查看看喔", "text-red-500");
            }
        }

        function showFeedback(msg, colorClass) {
            const fb = document.getElementById('step-feedback');
            fb.innerText = msg;
            fb.className = `flex-1 text-center font-bold text-lg ${colorClass}`;
        }

        function updateScore(pts) {
            scores[currentQIndex] += pts;
            document.getElementById('total-score').innerText = scores.reduce((a, b) => a + b, 0);
        }

        function startTimer() {
            if (timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) { clearInterval(timerId); checkAllFinished(true); }
            }, 1000);
        }

        function checkAllFinished(isTimeUp = false) {
            const allDone = completedSteps.every((val, idx) => val >= generateSteps(appData[idx]).length);
            if (allDone || isTimeUp) {
                clearInterval(timerId);
                const elapsed = 420 - timeLeft;
                document.getElementById('final-score').innerText = document.getElementById('total-score').innerText;
                document.getElementById('final-time').innerText = `${Math.floor(elapsed/60)}分${elapsed%60}秒`;
                document.getElementById('finish-modal').style.display = 'flex';
            }
        }

        function restartApp() {
            currentQIndex = 0; scores = appData.map(() => 0); completedSteps = appData.map(() => 0); timeLeft = 420;
            document.getElementById('total-score').innerText = '0';
            document.getElementById('finish-modal').style.display = 'none';
            initNav(); renderQuestion(); startTimer();
        }

        function closeModal() { document.getElementById('finish-modal').style.display = 'none'; }
    </script>

</body></html>
